          // AI 캔버스 생성 로딩 상태
          const [isGenerating, setIsGenerating] = useState(false);

          const [canvasData, setCanvasData] = useState({
            problem: '', solution: '', metrics: '', uvp: '', advantage: '', channels: '', segments: '', cost: '', revenue: ''
          });

          ];

            { name: "펫닥 (Petdoc)", stage: "Series B", funding: "150억 원", similarity: "92%", desc: "반려동물 원격 의료 상담 및 건강 관리 플랫폼" },
            { name: "핏펫 (Fitpet)", stage: "Series C", funding: "300억 원", similarity: "85%", desc: "반려동물 소변검사 키트 및 맞춤형 헬스케어 커머스" }
          ];

          // 1. AI 비즈니스 모델 생성 핸들러 (모의 동작)
          const handleGenerateAI = (e) => {
            e.preventDefault();
            setIsGenerating(true);
            
            // 2초 후 캔버스 데이터가 채워지고 화면이 전환되는 시뮬레이션
            setTimeout(() => {
                setCanvasData({
                    problem: "1. 반려동물 병원비의 불투명성 및 고비용\n2. 질병 초기 발견의 어려움\n3. 파편화된 건강 기록",
                    solution: "1. AI 기반 증상 체크 및 예상 병원비 산출\n2. 집에서 하는 간편 진단 키트 연동\n3. 생애주기 맞춤형 건강 수첩 제공",
                    metrics: "1. 월간 활성 사용자(MAU)\n2. AI 진단 완료 건수\n3. 제휴 동물병원 수",
                    uvp: "반려동물의 증상을 집에서 AI로 1분 만에 분석하고, 가장 적합하고 투명한 가격의 동물병원을 매칭해주는 스마트 헬스케어 플랫폼",
                    advantage: "1. 대학 부속 동물병원과 제휴된 방대한 임상 데이터 확보\n2. 자체 개발한 진단 알고리즘 특허 출원",
                    channels: "1. 반려동물 커뮤니티 및 SNS 앱 내 광고\n2. 펫페어 오프라인 부스\n3. 제휴 동물병원 내 홍보물",
                    segments: "1. 2030 1인 가구 펫팸족\n2. 만성 질환을 앓고 있는 노령견/묘 보호자\n3. 병원비 지출에 부담을 느끼는 반려인",

                setIsGenerating(false);
                setActiveTab('canvas');

          const handleCanvasChange = (field, value) => {

          const renderHome = () => (
            <div className="space-y-12 animate-fade-in">
              <section className="relative overflow-hidden bg-gradient-to-br from-blue-900 to-indigo-800 rounded-3xl shadow-xl">

                <div className="absolute bottom-0 left-0 -mb-20 -ml-20 w-72 h-72 bg-blue-500 opacity-10 rounded-full blur-2xl"></div>
                <div className="relative px-8 py-16 md:px-16 md:py-20 text-center flex flex-col items-center">
                  <span className="inline-block py-1 px-3 rounded-full bg-blue-800/50 text-blue-200 text-sm font-medium mb-6 border border-blue-700/50">충북대학교기술지주 공식 창업 평가 플랫폼</span>
                  <h1 className="text-3xl md:text-5xl font-extrabold text-white mb-6 leading-tight tracking-tight">당신의 혁신적인 아이디어, <br className="hidden md:block"/><span className="text-transparent bg-clip-text bg-gradient-to-r from-blue-200 to-cyan-200">AI가 가치를 증명합니다.</span></h1>

                  <button onClick={() => setActiveTab('newIdea')} className="group relative inline-flex items-center justify-center px-8 py-4 font-bold text-blue-900 bg-white rounded-full overflow-hidden transition-all hover:scale-105 active:scale-95">

                    <span className="text-lg">AI 사업성 진단 시작하기</span>
                  </button>
                </div>
              </section>

              <section>
                <div className="flex justify-between items-end mb-6">
                  <div><h2 className="text-2xl font-bold text-slate-900">나의 진단 현황</h2></div>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                  <div onClick={() => setActiveTab('newIdea')} className="bg-transparent border-2 border-dashed border-slate-300 rounded-2xl flex flex-col items-center justify-center p-8 text-slate-500 hover:bg-slate-100/50 hover:border-blue-400 hover:text-blue-600 transition-colors cursor-pointer min-h-[280px]">

                    <p className="font-semibold text-lg">새로운 아이디어 등록</p>
                  </div>

                      {project.status === "분석 중" && <div className="absolute top-0 left-0 w-full h-1 bg-blue-400"></div>}

                        <div className="flex justify-between items-start mb-4">

                            {project.status === '평가 완료' ? <IconCheckCircle2 size={12}/> : <IconClock size={12}/>} {project.status}
                          </span>
                        </div>
                        <h3 className="text-lg font-bold text-slate-900 mb-6 leading-snug line-clamp-2">{project.title}</h3>
                        <div className="grid grid-cols-2 gap-4 mb-6">

                      </div>
                      <div className="flex gap-2 mt-auto">
                        <button className="flex-1 py-2.5 rounded-lg text-sm font-semibold bg-slate-900 text-white">리포트 보기</button>

                      </div>
                    </div>
                  ))}

          const renderNewIdea = () => (

                  <div className="text-center mb-10">
                      <h2 className="text-3xl font-bold text-slate-900 mb-4">새 아이디어 진단 및 모델링</h2>
                      <p className="text-slate-500">기업/제품에 대한 간단한 소개를 작성하거나 기존 리포트를 업로드하시면, <br/>AI가 비즈니스 모델(린 캔버스)을 자동으로 추출하고 평가합니다.</p>
                  </div>

                  <form onSubmit={handleGenerateAI} className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 space-y-8">
                      {/* 수동 입력 파트 */}
                      <div className="space-y-4">
                          <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2"><IconFileText className="text-blue-600"/> 간단한 기업 및 제품 소개</h3>
                          <div className="grid grid-cols-2 gap-4">
                              <div>
                                  <label className="block text-sm font-medium text-slate-700 mb-1">프로젝트(기업) 명</label>
                                  <input type="text" className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="예: 펫닥 AI" required />
                              </div>
                              <div>
                                  <label className="block text-sm font-medium text-slate-700 mb-1">산업 분야</label>
                                  <select className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                                      <option>IT/플랫폼</option>
                                      <option>바이오/의료</option>
                                      <option>에너지/환경</option>
                                      <option>제조/하드웨어</option>
                                  </select>
                              </div>
                          </div>
                          <div>
                              <label className="block text-sm font-medium text-slate-700 mb-1">핵심 아이디어 및 해결하려는 문제 설명</label>
                              <textarea className="w-full h-32 px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all resize-none" placeholder="어떤 고객의 어떤 문제를 해결하고자 합니까? 어떻게 수익을 창출할 계획인지 자유롭게 적어주세요." required></textarea>
                          </div>
                      </div>

                      <div className="relative flex items-center py-2">
                          <div className="flex-grow border-t border-slate-200"></div>
                          <span className="flex-shrink-0 mx-4 text-slate-400 font-medium text-sm">또는 (OR)</span>
                          <div className="flex-grow border-t border-slate-200"></div>
                      </div>

                      {/* 파일 업로드 파트 */}
                      <div className="space-y-4">
                          <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2"><IconUploadCloud className="text-blue-600"/> 기존 문서 업로드로 자동 분석</h3>
                          <div className="border-2 border-dashed border-blue-200 bg-blue-50/50 rounded-2xl p-10 flex flex-col items-center justify-center text-center hover:bg-blue-50 transition-colors cursor-pointer">
                              <div className="bg-white p-3 rounded-full shadow-sm text-blue-600 mb-4">
                                  <IconUploadCloud size={32} />
                              </div>
                              <p className="font-bold text-slate-700 mb-1">PDF, Word, PPT 파일 업로드</p>
                              <p className="text-sm text-slate-500 mb-4">기업 설명서, IR 자료, 기존 리포트 등을 올려주시면 AI가 내용을 자동 파싱합니다.</p>
                              <button type="button" className="px-5 py-2.5 bg-white border border-slate-300 rounded-lg text-sm font-semibold text-slate-700 hover:bg-slate-50">컴퓨터에서 파일 찾기</button>
                          </div>
                      </div>

                      {/* 제출 버튼 */}
                      <div className="pt-4">
                          <button type="submit" disabled={isGenerating} className={`w-full py-4 rounded-xl font-bold text-white text-lg flex items-center justify-center gap-2 transition-all ${isGenerating ? 'bg-indigo-400 cursor-not-allowed' : 'bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 shadow-lg hover:shadow-xl'}`}>
                              {isGenerating ? (
                                  <><IconClock className="animate-spin" /> AI가 분석 및 생성 중입니다...</>
                              ) : (
                                  <><IconSparkles /> AI 비즈니스 모델(린 캔버스) 자동 생성하기</>
                              )}
                          </button>
                      </div>
                  </form>
              </div>
          );

          // 화면 렌더링: 탭 2 (스타트업 기획 캔버스)
          const renderCanvas = () => (
              <div className="space-y-8 animate-fade-in">
                  <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-2">
                      <div>
                          <h2 className="text-2xl font-bold text-slate-900">스타트업 기획 캔버스 (Lean Canvas)</h2>
                          <p className="text-slate-500">AI가 분석한 결과를 바탕으로 생성된 9-Block 모델입니다. 내용을 클릭하여 직접 수정할 수 있습니다.</p>
                      </div>
                      <div className="flex gap-2">
                          <button className="px-4 py-2 bg-white border border-slate-300 rounded-lg text-sm font-semibold text-slate-700 hover:bg-slate-50 flex items-center gap-2">
                              <IconSave size={16}/> 저장하기
                          </button>
                          <button className="px-4 py-2 bg-slate-900 rounded-lg text-sm font-semibold text-white hover:bg-slate-800 flex items-center gap-2">
                              <IconDownload size={16}/> PDF 리포트 다운로드
                          </button>
                      </div>
                  </div>

                  {/* 린 캔버스 9-Block UI (CSS Grid 활용) */}
                  <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                      <div className="grid grid-cols-1 lg:grid-cols-5 gap-0 border-l border-t border-slate-300">
                          
                          {/* Col 1: Problem */}
                          <div className="lg:col-span-1 border-r border-b border-slate-300 p-4 bg-red-50/30">
                              <h3 className="text-sm font-bold text-slate-800 mb-2 flex items-center gap-1">1. 문제 (Problem)</h3>
                              <textarea value={canvasData.problem} onChange={(e)=>handleCanvasChange('problem', e.target.value)} className="w-full h-48 lg:h-80 bg-transparent text-sm text-slate-600 outline-none resize-none leading-relaxed" placeholder="내용을 입력하세요..."></textarea>
                          </div>

                          {/* Col 2: Solution & Metrics */}
                          <div className="lg:col-span-1 border-r border-slate-300 flex flex-col">
                              <div className="border-b border-slate-300 p-4 flex-1 bg-green-50/30">
                                  <h3 className="text-sm font-bold text-slate-800 mb-2">4. 해결책 (Solution)</h3>
                                  <textarea value={canvasData.solution} onChange={(e)=>handleCanvasChange('solution', e.target.value)} className="w-full h-32 bg-transparent text-sm text-slate-600 outline-none resize-none leading-relaxed"></textarea>
                              </div>
                              <div className="border-b border-slate-300 p-4 flex-1 bg-blue-50/30">
                                  <h3 className="text-sm font-bold text-slate-800 mb-2">8. 핵심 지표 (Key Metrics)</h3>
                                  <textarea value={canvasData.metrics} onChange={(e)=>handleCanvasChange('metrics', e.target.value)} className="w-full h-32 bg-transparent text-sm text-slate-600 outline-none resize-none leading-relaxed"></textarea>
                              </div>
                          </div>

                          {/* Col 3: Unique Value Proposition */}
                          <div className="lg:col-span-1 border-r border-b border-slate-300 p-4 bg-amber-50/30">
                              <h3 className="text-sm font-bold text-slate-800 mb-2">3. 고유 가치 제안 (UVP)</h3>
                              <textarea value={canvasData.uvp} onChange={(e)=>handleCanvasChange('uvp', e.target.value)} className="w-full h-48 lg:h-80 bg-transparent text-sm text-slate-600 outline-none resize-none leading-relaxed"></textarea>
                          </div>

                          {/* Col 4: Unfair Advantage & Channels */}
                          <div className="lg:col-span-1 border-r border-slate-300 flex flex-col">
                              <div className="border-b border-slate-300 p-4 flex-1 bg-purple-50/30">
                                  <h3 className="text-sm font-bold text-slate-800 mb-2">9. 경쟁 우위 (Advantage)</h3>
                                  <textarea value={canvasData.advantage} onChange={(e)=>handleCanvasChange('advantage', e.target.value)} className="w-full h-32 bg-transparent text-sm text-slate-600 outline-none resize-none leading-relaxed"></textarea>
                              </div>
                              <div className="border-b border-slate-300 p-4 flex-1 bg-cyan-50/30">
                                  <h3 className="text-sm font-bold text-slate-800 mb-2">5. 채널 (Channels)</h3>
                                  <textarea value={canvasData.channels} onChange={(e)=>handleCanvasChange('channels', e.target.value)} className="w-full h-32 bg-transparent text-sm text-slate-600 outline-none resize-none leading-relaxed"></textarea>
                              </div>
                          </div>

                          {/* Col 5: Customer Segments */}
                          <div className="lg:col-span-1 border-r border-b border-slate-300 p-4 bg-rose-50/30">
                              <h3 className="text-sm font-bold text-slate-800 mb-2">2. 고객군 (Segments)</h3>
                              <textarea value={canvasData.segments} onChange={(e)=>handleCanvasChange('segments', e.target.value)} className="w-full h-48 lg:h-80 bg-transparent text-sm text-slate-600 outline-none resize-none leading-relaxed"></textarea>
                          </div>

                          {/* Bottom Row: Cost & Revenue (50% width each) */}
                          <div className="lg:col-span-5 flex flex-col lg:flex-row">
                              <div className="flex-1 border-r border-b lg:border-l-0 border-slate-300 p-4 bg-slate-50/50">
                                  <h3 className="text-sm font-bold text-slate-800 mb-2">7. 비용 구조 (Cost Structure)</h3>
                                  <textarea value={canvasData.cost} onChange={(e)=>handleCanvasChange('cost', e.target.value)} className="w-full h-24 bg-transparent text-sm text-slate-600 outline-none resize-none leading-relaxed"></textarea>
                              </div>
                              <div className="flex-1 border-r border-b border-slate-300 p-4 bg-slate-50/50">
                                  <h3 className="text-sm font-bold text-slate-800 mb-2">6. 수익원 (Revenue Streams)</h3>
                                  <textarea value={canvasData.revenue} onChange={(e)=>handleCanvasChange('revenue', e.target.value)} className="w-full h-24 bg-transparent text-sm text-slate-600 outline-none resize-none leading-relaxed"></textarea>
                              </div>
                          </div>
                      </div>
                  </div>

                  {/* 외부 투자 기업 유사 사례 */}
                  <div className="mt-12">
                      <h3 className="text-xl font-bold text-slate-900 mb-4 flex items-center gap-2"><IconSearch className="text-blue-600"/> 유사 비즈니스 모델 (외부 투자 유치 사례) 탐색</h3>
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                          {similarCompanies.map((company, idx) => (
                              <div key={idx} className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex items-start justify-between hover:border-blue-300 transition-colors">
                                  <div>
                                      <h4 className="font-bold text-slate-800 text-lg mb-1">{company.name}</h4>
                                      <p className="text-sm text-slate-500 mb-3">{company.desc}</p>
                                      <div className="flex gap-2">
                                          <span className="px-2 py-1 bg-slate-100 text-slate-600 text-xs rounded-md font-medium">{company.stage}</span>
                                          <span className="px-2 py-1 bg-blue-50 text-blue-600 text-xs rounded-md font-medium">투자금: {company.funding}</span>
                                      </div>
                                  </div>
                                  <div className="text-right">
                                      <div className="text-2xl font-black text-indigo-600">{company.similarity}</div>
                                      <div className="text-xs text-slate-400 font-medium">BM 매칭률</div>
                                  </div>
                              </div>
                          ))}
                      </div>
                  </div>
              </div>
          );

          // 화면 렌더링: 탭 3 (멘토링 / 투자 연계)
          const renderInvestment = () => (
              <div className="max-w-4xl mx-auto space-y-8 animate-fade-in">
                  <div className="text-center mb-10">
                      <h2 className="text-3xl font-bold text-slate-900 mb-4">멘토링 및 투자 연계 신청</h2>
                      <p className="text-slate-500">도출된 비즈니스 모델을 바탕으로 충북대학교기술지주의 전문가 멘토링과 <br/>맞춤형 투자사(VC) 매칭을 지원받으세요.</p>
                  </div>

                  <form className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 space-y-6">
                      <h3 className="text-xl font-bold text-slate-800 border-b pb-4 mb-6">투자 수요 정보</h3>
                      
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                          <div>
                              <label className="block text-sm font-medium text-slate-700 mb-2">현재 투자 단계</label>
                              <select className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                                  <option>극초기 (창업 준비 중)</option>
                                  <option>Seed (시드 투자)</option>
                                  <option>Pre-Series A</option>
                                  <option>Series A 이상</option>
                              </select>
                          </div>
                          <div>
                              <label className="block text-sm font-medium text-slate-700 mb-2">희망 투자 유치 금액</label>
                              <select className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                                  <option>1억 원 미만</option>
                                  <option>1억 ~ 5억 원</option>
                                  <option>5억 ~ 10억 원</option>
                                  <option>10억 원 이상</option>
                              </select>
                          </div>
                      </div>

                      <div>
                          <label className="block text-sm font-medium text-slate-700 mb-2">주요 투자금 사용 목적</label>
                          <textarea className="w-full h-24 px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none resize-none" placeholder="예: 시제품 개발, 마케팅 비용, 인건비 등"></textarea>
                      </div>

                      <h3 className="text-xl font-bold text-slate-800 border-b pb-4 mt-8 mb-6">필요한 멘토링 분야 (다중 선택 가능)</h3>
                      <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                          {['기술 고도화/특허', '비즈니스 모델(BM)', '재무/세무/법률', '마케팅/판로개척', '투자 IR 자료 피칭', '팀 빌딩/조직관리'].map((item) => (
                              <label key={item} className="flex items-center gap-2 p-3 border rounded-xl cursor-pointer hover:bg-slate-50 transition-colors">
                                  <input type="checkbox" className="w-4 h-4 text-blue-600 rounded" />
                                  <span className="text-sm font-medium text-slate-700">{item}</span>
                              </label>
                          ))}
                      </div>

                      <div className="pt-8">
                          <button type="button" onClick={() => alert('신청이 완료되었습니다. 담당자가 확인 후 연락드리겠습니다.')} className="w-full py-4 bg-slate-900 hover:bg-slate-800 rounded-xl font-bold text-white text-lg transition-colors">
                              매칭 및 지원 신청하기
                          </button>
                      </div>
                  </form>
              </div>
          );

          return (
            <div className="min-h-screen bg-slate-50 font-sans text-slate-800 pb-20">
              <nav className="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div className="flex justify-between h-16">
                    <div className="flex items-center gap-2 cursor-pointer" onClick={() => setActiveTab('home')}>
                      <div className="w-8 h-8 bg-blue-700 rounded-lg flex items-center justify-center text-white font-bold text-xl">C</div>
                      <span className="font-bold text-lg text-slate-900 tracking-tight">CBNU <span className="text-blue-700">AI-Venture Desk</span></span>
                    </div>

                    <div className="hidden md:flex items-center space-x-8">
                      <button onClick={() => setActiveTab('newIdea')} className={`font-semibold py-5 transition-colors ${activeTab === 'newIdea' ? 'text-blue-700 border-b-2 border-blue-700' : 'text-slate-500 hover:text-slate-900'}`}>새 아이디어 진단</button>
                      <button onClick={() => setActiveTab('canvas')} className={`font-semibold py-5 transition-colors ${activeTab === 'canvas' ? 'text-blue-700 border-b-2 border-blue-700' : 'text-slate-500 hover:text-slate-900'}`}>스타트업 기획 캔버스</button>
                      <button onClick={() => setActiveTab('investment')} className={`font-semibold py-5 transition-colors ${activeTab === 'investment' ? 'text-blue-700 border-b-2 border-blue-700' : 'text-slate-500 hover:text-slate-900'}`}>멘토링 / 투자 연계</button>
                    </div>

                    <div className="flex items-center space-x-4">
                      <button className="text-slate-400 hover:text-slate-600"><IconBell size={20} /></button>
                      <div className="h-8 w-8 rounded-full bg-slate-200 flex items-center justify-center text-slate-600 cursor-pointer hover:bg-slate-300 transition"><IconUser size={18} /></div>
                    </div>
                  </div>
                </div>
              </nav>

              <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                  {activeTab === 'home' && renderHome()}
                  {activeTab === 'newIdea' && renderNewIdea()}
                  {activeTab === 'canvas' && renderCanvas()}
                  {activeTab === 'investment' && renderInvestment()}
              </main>

              {/* 간단한 CSS 애니메이션 추가 */}
              <style>{`
                  .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
                  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
              `}</style>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
